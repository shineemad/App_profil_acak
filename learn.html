<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profil data</title>
<style>
    body {
        font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        min-height: 100vh;
        background-color: #e4e9f2; /* Sedikit digelapkan agar warna putih kartu lebih menonjol */
    }
    .container {
        background-color: #ffffff; /* Kartunya saya jadikan putih bersih */
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        
        /* PERBAIKAN RESPONSIVITAS */
        width: 90%; 
        max-width: 320px; 
        
        /* PERBAIKAN FLEXBOX: Mesinnya dinyalakan! */
        display: flex;
        flex-direction: column; /* Berbaris dari atas ke bawah */
        align-items: center;    /* Agar semua isi rata tengah */
    }
    .profil {
        width: 150px;
        height: 150px;
        border-radius: 50%; /* Diubah jadi 50% agar bulat sempurna */
        object-fit: cover;  /* Agar foto tidak penyok */
        margin-bottom: 10px;
        border: 4px solid #adadad; /* Tambahan sedikit bingkai */
    }
    .container h1 {
        margin-top: 0;
        margin-bottom: 10px;
        font-size: 24px;
    }
    .container ul {
        list-style-type: none;
        padding: 0; /* Menghilangkan dorongan ke kanan bawaan HTML */
        text-align: center; /* Teks dibikin rata tengah */
        width: 100%;
        color: #555;
    }
    li {
        margin-bottom: 8px;
    }
    
    /* PERBAIKAN FLEXBOX TOMBOL */
    .tombol {
        display: flex; /* Dinyalakan flexbox-nya */
        gap: 10px;     /* Diberi jarak antar tombol 10px */
        width: 100%;   /* Wadahnya dipaksa memenuhi lebar kartu */
        margin-top: 15px;
    }
    .tombol button {
        flex: 1; /* AJAIB: Membuat kedua tombol membagi lebar dengan adil (50:50) */
        background-color: #adadad;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }
    .tombol button:hover {
        background-color: #427eff;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>Profil data</h1>
        <img src="https://i.pravatar.cc/150?img=11" alt="Foto Profil" class="profil">
        <ul>
            <li>Nama    : Bambang</li>
            <li>Umur    : 25 tahun</li>
            <li>Alamat  : Jl. Merdeka No. 123</li>
        </ul>
        <div class="tombol">
            <button>Ubah Profil</button>
            <button class="tombol-hapus">Hapus Profil</button>
        </div>
    </div>
</body>
</html>
