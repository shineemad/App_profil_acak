<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Hari Raya Idul Fitri</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f4c3a, #062b1f);
            font-family: 'Poppins', sans-serif;
            color: #fff;
            text-align: center;
            overflow: hidden; /* Mencegah layar bisa di-scroll akibat animasi */
        }

        /* Container untuk efek jatuh */
        .falling-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Agar tidak mengganggu klik pada card */
            z-index: 0;
        }

        /* Elemen bintang dan bulan yang jatuh */
        .falling-item {
            position: absolute;
            top: -10%;
            animation: fall linear infinite;
            opacity: 0.8;
        }

        /* Animasi jatuh dari atas ke bawah sambil berputar sedikit */
        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.3);
            max-width: 90%;
            width: 400px;
            animation: fadeIn 1.5s ease-in-out;
            position: relative;
            z-index: 1; /* Memastikan card berada di atas efek bintang jatuh */
        }

        h1 {
            font-family: 'Amiri', serif;
            color: #ffd700;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #e0e0e0;
        }

        p {
            font-size: 1em;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .sender {
            font-weight: 600;
            color: #ffd700;
            margin-top: 20px;
            font-size: 1.1em;
        }

        .ornament {
            font-size: 2em;
            margin-bottom: 10px;
        }

        span.arabic {
            font-family: 'Amiri', serif;
            color: #e0e0e0;
            font-size: 2.1em;
            line-height: 1.8;
            display: block;
            margin-bottom: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="falling-container">
        <div class="falling-item" style="left: 10%; animation-duration: 5s; animation-delay: 0s; font-size: 1.5em;">✨</div>
        <div class="falling-item" style="left: 25%; animation-duration: 7s; animation-delay: 2s; font-size: 2em;">🌙</div>
        <div class="falling-item" style="left: 45%; animation-duration: 6s; animation-delay: 1s; font-size: 1.2em;">⭐</div>
        <div class="falling-item" style="left: 65%; animation-duration: 8s; animation-delay: 3s; font-size: 1.8em;">🌟</div>
        <div class="falling-item" style="left: 85%; animation-duration: 4s; animation-delay: 0.5s; font-size: 1.5em;">✨</div>
        <div class="falling-item" style="left: 15%; animation-duration: 9s; animation-delay: 4s; font-size: 1.2em;">⭐</div>
        <div class="falling-item" style="left: 75%; animation-duration: 6.5s; animation-delay: 2.5s; font-size: 2.2em;">🌙</div>
        <div class="falling-item" style="left: 55%; animation-duration: 5.5s; animation-delay: 1.5s; font-size: 1.5em;">🌟</div>
    </div>

    <div class="card">
        <div class="ornament">🕌✨</div>
        <h1>Selamat Hari Raya<br> Idul Fitri</h1>
        <h2>1 Syawal 1447 H</h2>
        
        <span class="arabic">تَقَبَّلَ ٱللّٰهُ مِنَّا وَمِنكُمْ<br>مِنَ الْعَائِدِيْنَ وَالْفَائِزِيْنَ</span>
        
        <p>Mohon maaf lahir dan batin atas segala khilaf dan salah, semoga kita kembali suci di hari yang fitri ini.</p>
        
        <div class="sender">
            Salam hangat,<br>
            Ahmad Riyadi
        </div>
    </div>

</body>
</html>
